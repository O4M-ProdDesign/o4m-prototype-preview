ns, fear, and first steps.",memberCount:61480,color:"#c25a5a",initials:"ND"},{id:"caregivers",name:"Caregivers & Family",description:"For those supporting a loved one \u2014 navigating care, emotions, and practical challenges.",memberCount:34920,color:"#7ab85a",initials:"CF"}]}],qy={"rcc-general":[{id:"post-rcc-1",communityId:"rcc-general",author:{name:"James T.",initials:"JT",color:"#5a8fd1"},timeAgo:"2 days ago",body:"Just finished my 12-month surveillance CT \u2014 clear scan! My oncologist said we'll move to annual scans now. For anyone early in the process, the surveillance period is hard but it does get easier. Hang in there.",likes:47,commentCount:12},{id:"post-rcc-2",communityId:"rcc-general",author:{name:"Maria S.",initials:"MS",color:"#d15a8a"},timeAgo:"5 days ago",body:"Question for the group \u2014 has anyone had experience with the KEYNOTE-564 criteria for adjuvant pembrolizumab? My oncologist is recommending it but I'm trying to understand if I qualify as intermediate-high risk. My pT2 grade 4 tumour was completely resected.",likes:23,commentCount:8},{id:"post-rcc-3",communityId:"rcc-general",author:{name:"David K.",initials:"DK",color:"#4aab6d"},timeAgo:"1 week ago",body:"Six months post partial nephrectomy and my eGFR has stabilised at 64. The first few months were scary watching it drop, but the remaining kidney has compensated more than expected. If you're worried about kidney function after surgery \u2014 keep up with the labs and give it time.",likes:61,commentCount:15},{id:"post-rcc-4",communityId:"rcc-general",author:{name:"Priya N.",initials:"PN",color:"#e07b5a"},timeAgo:"2 weeks ago",body:"Does anyone have tips for managing fatigue during adjuvant pembrolizumab? I'm on cycle 4 and the tiredness is manageable but I want to stay ahead of it rather than let it build up.",likes:34,commentCount:19}],"rcc-clear-cell":[{id:"post-cc-1",communityId:"rcc-clear-cell",author:{name:"Rachel B.",initials:"RB",color:"#7c6fb0"},timeAgo:"3 days ago",body:"Pathology came back clear cell, grade 2, pT1b. My surgeon is recommending partial nephrectomy. Has anyone had experience with the robotic approach versus laparoscopic? Trying to understand the difference in recovery.",likes:18,commentCount:9},{id:"post-cc-2",communityId:"rcc-clear-cell",author:{name:"Tom H.",initials:"TH",color:"#5ab8d1"},timeAgo:"1 week ago",body:"For those of you who had clear cell RCC stage I \u2014 did your oncologist recommend adjuvant therapy or surveillance? I'm getting conflicting guidance and trying to understand what the NCCN guidelines actually say for low-risk patients.",likes:41,commentCount:22}],immunotherapy:[{id:"post-io-1",communityId:"immunotherapy",author:{name:"Sandra L.",initials:"SL",color:"#e0a84a"},timeAgo:"1 day ago",body:"Cycle 6 of pembrolizumab done. Developed some thyroid issues (hypothyroidism) which my team says is actually a positive immune response sign. Now on levothyroxine. Anyone else dealing with thyroid side effects? It's manageable but wasn't expecting it.",likes:29,commentCount:14},{id:"post-io-2",communityId:"immunotherapy",author:{name:"Kevin M.",initials:"KM",color:"#c25a5a"},timeAgo:"4 days ago",body:"Important reminder to the group \u2014 report any new symptoms to your oncology team promptly, even if they seem minor. I had what I thought was a mild rash and it turned out to be immune-related dermatitis. Caught early it was easy to manage.",likes:87,commentCount:6}]},Gy={"post-rcc-1":[{id:"c1",author:{name:"Linda W.",initials:"LW",color:"#7c6fb0"},timeAgo:"2 days ago",body:"Congratulations! This is such great news. I'm 8 months out and this gives me so much hope."},{id:"c-ai-rcc-1",isAI:!0,timeAgo:"2 days ago",body:"Annual surveillance after a clear 12-month scan is consistent with NCCN guidelines for low and intermediate-risk RCC. The transition from more frequent to annual imaging is a meaningful milestone. For anyone in early surveillance, symptoms to watch for between scans include unexplained pain, fatigue, or blood in urine \u2014 report these to your care team promptly rather than waiting for a scheduled scan."},{id:"c3",author:{name:"Michael R.",initials:"MR",color:"#e07b5a"},timeAgo:"1 day ago",body:"Just hit my 6-month clear scan last week. Seeing your post makes me feel like I can get to 12 months too. Thank you for sharing."}],"post-rcc-2":[{id:"c-ai-rcc-2",isAI:!0,timeAgo:"5 days ago",body:"The KEYNOTE-564 trial enrolled patients with clear cell RCC who had complete resection and were at intermediate-high, high, or M1 NED risk. Intermediate-high risk is generally defined as pT2 grade 4 or pT3 any grade. A pT2 grade 4 tumour with negative margins would typically fall in this category. Your oncologist is the right person to confirm eligibility based on your full pathology report. It's worth asking specifically about your IMDC risk score and how it factors into the recommendation."},{id:"c5",author:{name:"James T.",initials:"JT",color:"#5a8fd1"},timeAgo:"4 days ago",body:"I'm on KEYNOTE-564 adjuvant pembro. My surgeon called me pT2 grade 4 as well. It is a commitment \u2014 17 cycles over a year \u2014 but the side effects have been manageable for me. Feel free to message me if you want to talk through it."}],"post-rcc-4":[{id:"c-ai-rcc-4",isAI:!0,timeAgo:"2 weeks ago",body:"Fatigue during immunotherapy is common and often cumulative. Evidence-based strategies that help many patients include: prioritising sleep consistency over total hours, light aerobic activity (even a 20-minute walk) on days when energy allows, and tracking fatigue patterns relative to your infusion cycle so you can plan lower-demand activities in your peak-fatigue window. If fatigue is significantly impacting daily function, tell your oncology team \u2014 dose adjustments or a short break are options."},{id:"c8",author:{name:"Sandra L.",initials:"SL",color:"#e0a84a"},timeAgo:"2 weeks ago",body:"The fatigue for me peaks around days 3\u20135 post infusion then improves. I block those days out and plan lighter activities. The predictability actually helps more than anything."}],"post-io-1":[{id:"c-ai-io-1",isAI:!0,timeAgo:"1 day ago",body:"Immune-related thyroid dysfunction (most commonly hypothyroidism) occurs in roughly 10\u201315% of patients on PD-1 inhibitors. In many oncology teams it's considered a marker of immune activation, though this doesn't mean it should go unmanaged. Levothyroxine replacement is straightforward and most patients tolerate it well. Thyroid labs are typically checked every 2\u20133 cycles \u2014 make sure your team is monitoring TSH and free T4 regularly. Symptoms to report: unusual fatigue beyond your baseline, cold intolerance, weight changes, or heart palpitations."}]};var ur={RCC_RCTS_PARTIAL_NEPHRECTOMY:{type:"procedure",title:"Partial nephrectomy (surgery)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Surgery to remove only the part of the kidney containing the tumor, while preserving as much healthy kidney tissue as possible.",goals:["Remove the tumor completely with clear margins","Preserve kidney function for the long term","Reduce the risk of cancer returning"],overview:[{label:"Recovery time",detail:"Most people go home within 1\u20133 days. Full recovery typically takes 2\u20134 weeks for laparoscopic surgery."},{label:"Kidney function",detail:"Preserving part of the kidney helps maintain long-term kidney health, which matters for overall health outcomes."},{label:"Surgical approach",detail:"Usually performed laparoscopically (minimally invasive) or robotically. Open surgery is less common."},{label:"Eligibility",detail:"Best suited for tumors that are smaller or positioned where partial removal is feasible."}],regimens:[{id:"pnx-lap",name:"Laparoscopic partial nephrectomy",category:"Minimally invasive",description:"Small incisions, camera-guided. Shorter hospital stay and faster recovery."},{id:"pnx-rob",name:"Robotic-assisted partial nephrectomy",category:"Minimally invasive",description:"Robot-assisted precision. Similar recovery to laparoscopic approach."},{id:"pnx-open",name:"Open partial nephrectomy",category:"Open surgery",description:"Single larger incision. May be used for complex tumor positions."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_RADICAL_NEPHRECTOMY:{type:"procedure",title:"Radical nephrectomy (surgery)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Surgery to remove the entire kidney along with nearby tissue. Recommended when partial removal is not feasible.",goals:["Remove the entire tumor and kidney with clear margins","Prevent local recurrence","Provide definitive surgical treatment"],overview:[{label:"Recovery time",detail:"Hospital stay of 2\u20134 days. Full recovery typically 3\u20136 weeks."},{label:"Living with one kidney",detail:"Most people live well with one kidney. Your care team will monitor kidney function after surgery."},{label:"Surgical approach",detail:"Usually laparoscopic or robotic. Open surgery is used in some cases."},{label:"When it is recommended",detail:"Used when the tumor is large, centrally located, or partial removal is not safely possible."}],regimens:[{id:"rnx-lap",name:"Laparoscopic radical nephrectomy",category:"Minimally invasive",description:"Most common approach. Small incisions, shorter recovery."},{id:"rnx-rob",name:"Robotic-assisted radical nephrectomy",category:"Minimally invasive",description:"Robot-assisted. Similar outcomes to laparoscopic."},{id:"rnx-open",name:"Open radical nephrectomy",category:"Open surgery",description:"Used for large or complex tumors."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_PERCUT_ABLATION:{type:"procedure",title:"Percutaneous ablation",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"A needle is guided through the skin to destroy the tumor using heat or cold \u2014 without removing the kidney.",goals:["Destroy tumor cells without surgery","Preserve kidney tissue and function","Minimal recovery time compared to surgery"],overview:[{label:"How it works",detail:"A radiologist inserts a needle directly into the tumor under imaging guidance. Heat (radiofrequency or microwave) or extreme cold (cryoablation) destroys the tumor."},{label:"Recovery",detail:"Usually done as an outpatient procedure. Most people go home the same day or after one night."},{label:"Best suited for",detail:"Small tumors (under 3\u20134 cm), patients who are not good surgical candidates, or those who want to preserve maximum kidney function."},{label:"Follow-up imaging",detail:"CT or MRI scans are needed after treatment to confirm the tumor was fully treated."}],regimens:[{id:"abl-rfa",name:"Radiofrequency ablation (RFA)",category:"Heat-based",description:"Uses electrical energy to heat and destroy tumor cells."},{id:"abl-mwa",name:"Microwave ablation (MWA)",category:"Heat-based",description:"Uses microwave energy. Can treat larger areas than RFA."},{id:"abl-cryo",name:"Cryoablation",category:"Cold-based",description:"Uses extreme cold to freeze and destroy the tumor."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_RT_SBRT:{type:"procedure",title:"Radiation therapy (SBRT)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"High doses of precisely targeted radiation delivered to the tumor over a small number of treatment sessions.",goals:["Destroy the tumor without surgery","Preserve kidney function","Option for patients who cannot undergo surgery"],overview:[{label:"Treatment sessions",detail:"Typically 3\u20135 sessions over 1\u20132 weeks. Each session takes 30\u201360 minutes."},{label:"Precision targeting",detail:"Advanced imaging is used to precisely aim radiation at the tumor while protecting surrounding healthy tissue."},{label:"Side effects",detail:"Generally well tolerated. Fatigue is the most common side effect. Skin irritation can occur."},{label:"Follow-up",detail:"Imaging scans after treatment monitor response. Kidney function is tracked over time."}],regimens:[{id:"sbrt-standard",name:"SBRT (stereotactic body radiation therapy)",category:"Standard",description:"Precisely focused radiation over 3\u20135 sessions."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_ACTIVE_SURVEILLANCE:{type:"procedure",title:"Active surveillance",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Regular monitoring with imaging scans instead of immediate treatment. Used for small, slow-growing tumors where the risks of treatment may outweigh the benefits.",goals:["Avoid unnecessary treatment for slow-growing tumors","Monitor closely so treatment can start if the tumor grows","Preserve quality of life"],overview:[{label:"Imaging schedule",detail:"CT or MRI scans every 3\u20136 months initially, then annually if the tumor is stable."},{label:"Who it is for",detail:"Small tumors (under 2\u20133 cm), older patients, those with other significant health conditions, or patients who prefer to avoid surgery."},{label:"Switching to treatment",detail:"If the tumor grows significantly or symptoms develop, active treatment is recommended."},{label:"What to expect",detail:"Regular clinic visits and imaging. Most people on active surveillance never need treatment for their small kidney tumor."}],regimens:[{id:"surv-active",name:"Active surveillance protocol",category:"Monitoring",description:"Regular imaging and clinic visits. No treatment unless growth is detected."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_ADJUV_PEMBRO:{type:"medication",title:"Adjuvant Pembrolizumab (Keytruda)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"An immunotherapy given after surgery to reduce the risk of the cancer coming back. Based on the KEYNOTE-564 clinical trial.",goals:["Reduce the risk of cancer recurrence after surgery","Help the immune system recognise and destroy any remaining cancer cells","Improve long-term disease-free survival"],overview:[{label:"Duration",detail:"17 cycles over approximately 12 months. Given every 6 weeks as an IV infusion."},{label:"Who it is for",detail:"Patients with intermediate-high or high-risk Stage I\u2013III clear cell RCC who have had surgery (KEYNOTE-564 criteria)."},{label:"Side effects",detail:"Immune-related side effects can affect any organ. Fatigue, skin rash, and joint pain are most common. Serious immune reactions are uncommon but require prompt attention."},{label:"Monitoring",detail:"Regular blood tests and clinic visits throughout treatment. Imaging at scheduled intervals."}],regimens:[{id:"pembro-adjuv",name:"Pembrolizumab 400mg Q6W",category:"NCCN Category 1",description:"400mg IV infusion every 6 weeks \xD7 17 cycles (approximately 12 months)."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024. Based on KEYNOTE-564."},RCC_RCTS_CLINICAL_TRIAL:{type:"procedure",title:"Clinical trial",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"A clinical trial gives access to newer treatments being studied that are not yet widely available. NCCN recommends considering a clinical trial at any point in treatment.",goals:["Access to novel therapies not yet approved","Contribute to advancing cancer treatment","Close monitoring throughout participation"],overview:[{label:"What to expect",detail:"Trials vary widely. Your care team will explain the specific protocol, schedule, and what is known about the treatment being studied."},{label:"Eligibility",detail:"Each trial has specific eligibility criteria. Your oncologist can identify trials you may qualify for."},{label:"Finding trials",detail:"ClinicalTrials.gov lists all active trials. Your cancer centre may also have relevant trials available."},{label:"Your rights",detail:"Participation is always voluntary. You can withdraw at any time without affecting your other care."}],regimens:[{id:"ct-general",name:"Clinical trial (discuss with your care team)",category:"Research",description:"Your oncologist can identify trials you may qualify for."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_SURVEILLANCE:{type:"procedure",title:"Surveillance after treatment",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Regular visits and imaging after treatment to monitor for recurrence and track kidney function.",goals:["Detect any cancer recurrence early","Monitor kidney function over time","Catch and address treatment side effects"],overview:[{label:"Imaging schedule",detail:"CT of chest, abdomen, and pelvis every 3\u20136 months for the first 2\u20133 years, then annually."},{label:"Blood tests",detail:"Kidney function, blood count, and metabolic panel at each visit."},{label:"What to report",detail:"New symptoms, unexplained pain, fatigue, or changes in urination should be reported promptly."},{label:"Duration",detail:"Surveillance continues for at least 5 years after treatment, and sometimes longer."}],regimens:[{id:"surv-post",name:"Post-treatment surveillance protocol",category:"Monitoring",description:"Regular imaging and labs per NCCN schedule."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_METASTASECTOMY_ADJUV_PEMBRO:{type:"procedure",title:"Metastasectomy + adjuvant Pembrolizumab",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"When all visible areas of cancer spread can be completely removed, surgery followed by adjuvant pembrolizumab may improve outcomes.",goals:["Remove all visible metastatic disease surgically","Use immunotherapy after surgery to reduce recurrence risk"],overview:[{label:"Two-part treatment",detail:"First, surgery to remove all sites of spread. Then pembrolizumab immunotherapy after recovery."},{label:"Eligibility",detail:"Only suitable when all metastatic sites are technically resectable and the patient is fit for surgery."},{label:"Pembrolizumab duration",detail:"Following surgery, pembrolizumab is given every 6 weeks for approximately 12 months."}],regimens:[{id:"meta-pembro",name:"Metastasectomy + Pembrolizumab 400mg Q6W",category:"Surgery + Immunotherapy",description:"Surgery for complete resection followed by pembrolizumab for 17 cycles."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_SYSTEMIC_FIRSTLINE_CLEARCELL:{type:"medication",title:"First-line systemic therapy (clear cell)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Several medicine combinations are available as the first treatment for metastatic clear cell kidney cancer. The best choice depends on your health, risk category, and preferences.",goals:["Control cancer growth and spread","Shrink existing tumors where possible","Improve overall and progression-free survival"],overview:[{label:"Combination approach",detail:"Most regimens combine an immunotherapy (PD-1/PD-L1 inhibitor) with either another immunotherapy or a targeted therapy (VEGF inhibitor)."},{label:"Risk category",detail:"Your oncologist will assess your IMDC risk score to help select the most appropriate regimen."},{label:"Duration",detail:"Treatment continues until the cancer progresses or side effects become unmanageable. Some regimens have defined endpoints."}],regimens:[{id:"fl-nivo-cabo",name:"Nivolumab + Cabozantinib",category:"NCCN Category 1",description:"Nivolumab 240mg IV Q2W or 480mg Q4W + cabozantinib 40mg oral daily. Combination immunotherapy + targeted therapy."},{id:"fl-pembro-axitinib",name:"Pembrolizumab + Axitinib",category:"NCCN Category 1",description:"Pembrolizumab 200mg IV Q3W + axitinib 5mg oral twice daily."},{id:"fl-nivo-ipi",name:"Nivolumab + Ipilimumab",category:"NCCN Category 1 (intermediate/poor risk)",description:"Dual immunotherapy. Nivolumab 3mg/kg + ipilimumab 1mg/kg Q3W \xD7 4, then nivolumab maintenance."},{id:"fl-pembro-lenvat",name:"Pembrolizumab + Lenvatinib",category:"NCCN Category 1",description:"Pembrolizumab 200mg IV Q3W + lenvatinib 20mg oral daily."},{id:"fl-cabo-mono",name:"Cabozantinib (monotherapy)",category:"NCCN Category 1 (poor risk)",description:"Oral targeted therapy 60mg daily. Option for poor-risk patients or those not suited to immunotherapy."},{id:"fl-sunitinib",name:"Sunitinib",category:"NCCN Category 1",description:"50mg oral daily, 4 weeks on / 2 weeks off."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_NEPHRECTOMY:{type:"procedure",title:"Nephrectomy (surgery)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Surgery to remove the kidney and surrounding tissue when the tumor can be surgically removed.",goals:["Remove the primary tumor","Provide local disease control","Prepare for systemic therapy if needed"],overview:[{label:"In Stage IV",detail:"Surgery in metastatic disease is used selectively \u2014 when the kidney tumor is causing symptoms, or in combination with systemic therapy."},{label:"Recovery",detail:"2\u20134 days in hospital. Full recovery 3\u20136 weeks depending on approach."}],regimens:[{id:"nep-lap",name:"Laparoscopic nephrectomy",category:"Minimally invasive",description:"Small incisions, camera-guided removal."},{id:"nep-open",name:"Open nephrectomy",category:"Open surgery",description:"Used for larger or more complex tumors."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_CYTOREDUCTIVE_NEPHRECTOMY:{type:"procedure",title:"Cytoreductive nephrectomy",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Surgery to remove the kidney even when the cancer has spread, to reduce the overall tumor burden and potentially improve response to systemic therapy.",goals:["Reduce the total amount of cancer in the body","Potentially improve response to subsequent systemic therapy","Manage symptoms caused by the primary tumor"],overview:[{label:"Who it is for",detail:"Selected patients with good performance status, limited metastatic burden, and a primary tumor causing symptoms or making up the bulk of disease."},{label:"Timing",detail:"May be done before systemic therapy (upfront) or after a period of treatment (deferred) to confirm disease does not rapidly progress."},{label:"Recovery",detail:"Similar to standard nephrectomy. Systemic therapy typically starts 4\u20136 weeks after surgery."}],regimens:[{id:"cyto-nep",name:"Cytoreductive nephrectomy",category:"Surgery",description:"Removal of the primary kidney tumor in the setting of metastatic disease."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_METASTASECTOMY_SBRT:{type:"procedure",title:"Metastasectomy or SBRT or ablation",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"When the cancer has spread to only a few places, surgery, focused radiation, or ablation can treat those specific sites.",goals:["Remove or destroy limited sites of spread","Achieve local control of metastatic lesions","Potentially delay the need for systemic therapy"],overview:[{label:"Oligometastatic disease",detail:"This approach is used when there are only 1\u20133 metastatic sites that can be completely treated."},{label:"Options",detail:"Surgery (metastasectomy), focused radiation (SBRT), or image-guided ablation \u2014 chosen based on site location and patient health."}],regimens:[{id:"oligo-surgery",name:"Metastasectomy",category:"Surgery",description:"Surgical removal of metastatic lesion(s)."},{id:"oligo-sbrt",name:"SBRT to metastatic sites",category:"Radiation",description:"Focused radiation to 1\u20133 metastatic lesions over 3\u20135 sessions."},{id:"oligo-ablation",name:"Percutaneous ablation of metastases",category:"Ablation",description:"Needle-based ablation for accessible metastatic sites."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_BEST_SUPPORTIVE_CARE:{type:"procedure",title:"Best supportive care",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"Care focused on relieving symptoms, improving comfort, and maintaining quality of life \u2014 rather than treating the cancer directly.",goals:["Manage pain and other symptoms effectively","Protect and strengthen bones if affected","Support overall wellbeing and quality of life"],overview:[{label:"Palliative intent",detail:"Supportive care focuses on how you feel day to day, not on shrinking the tumor. It can be given alongside or instead of cancer-directed treatment."},{label:"Bone health",detail:"If the cancer has spread to bones, medications to protect bone strength may be recommended."},{label:"Pain management",detail:"A dedicated pain and palliative care team can help manage pain, fatigue, and other symptoms."},{label:"Your preferences",detail:"Supportive care planning is centred around your goals, values, and what matters most to you."}],regimens:[{id:"bsc-general",name:"Best supportive care",category:"Palliative",description:"Symptom management, pain control, bone protection, and quality of life support."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_SYSTEMIC_NONCLEARCELL:{type:"medication",title:"Systemic therapy (non-clear cell)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"For kidney cancers that are not the most common clear cell type, several medicine options are available based on the specific subtype.",goals:["Control cancer growth in non-clear cell subtypes","Tailor treatment to the specific histology"],overview:[{label:"Subtypes",detail:"Non-clear cell RCC includes papillary, chromophobe, translocation, medullary, and other rare subtypes. Each may respond differently to treatment."},{label:"Clinical trial",detail:"NCCN strongly recommends considering a clinical trial for non-clear cell RCC, as evidence is more limited than for clear cell disease."}],regimens:[{id:"ncc-cabo",name:"Cabozantinib",category:"NCCN Category 2A",description:"Oral targeted therapy. Broadest evidence across non-clear cell subtypes."},{id:"ncc-suni",name:"Sunitinib",category:"NCCN Category 2A",description:"Oral VEGF inhibitor. Historical standard for papillary RCC."},{id:"ncc-ever",name:"Everolimus",category:"NCCN Category 2A",description:"Oral mTOR inhibitor."},{id:"ncc-ct",name:"Clinical trial",category:"Preferred",description:"Preferred option per NCCN given limited evidence in non-clear cell subtypes."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_SYSTEMIC_SUBSEQUENT_CLEARCELL_PRIORIO:{type:"medication",title:"Subsequent systemic therapy (clear cell, prior IO)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"When the cancer grows after a first treatment that included immunotherapy, several targeted therapies are available as the next line of treatment.",goals:["Control cancer growth after prior immunotherapy","Extend progression-free survival","Maintain quality of life"],overview:[{label:"Targeted therapy focus",detail:"After IO-based first-line therapy, VEGF-targeted agents are the primary subsequent option."},{label:"Treatment selection",detail:"Choice depends on prior therapies, performance status, and side effect profile preferences."},{label:"Duration",detail:"Treatment continues until progression or unacceptable toxicity."}],regimens:[{id:"sub-io-cabo",name:"Cabozantinib",category:"NCCN Category 1",description:"Oral VEGF/MET/AXL inhibitor. 60mg daily. Preferred option after IO-based first-line therapy."},{id:"sub-io-lenvat-ever",name:"Lenvatinib + Everolimus",category:"NCCN Category 1",description:"Lenvatinib 18mg + everolimus 5mg oral daily. Combination targeted therapy."},{id:"sub-io-axitinib",name:"Axitinib",category:"NCCN Category 2A",description:"Oral VEGF inhibitor. 5mg twice daily."},{id:"sub-io-suni",name:"Sunitinib",category:"NCCN Category 2A",description:"Oral VEGF inhibitor. 50mg daily 4 weeks on / 2 off."},{id:"sub-io-nivo",name:"Nivolumab (monotherapy)",category:"NCCN Category 2A",description:"May be considered if not previously used as monotherapy."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."},RCC_RCTS_SYSTEMIC_SUBSEQUENT_CLEARCELL_IONAIVE:{type:"medication",title:"Subsequent systemic therapy (clear cell, IO na\xEFve)",clinicalClass:"Suggested treatment \xB7 NCCN Guidelines",description:"When the cancer grows after a first treatment that did not include immunotherapy, both immunotherapy and targeted therapy options are available.",goals:["Control cancer growth after prior targeted therapy","Introduce immunotherapy if not previously used","Extend progression-free survival"],overview:[{label:"Immunotherapy opportunity",detail:"If first-line therapy did not include immunotherapy, nivolumab monotherapy is a preferred subsequent option."},{label:"Targeted therapy",detail:"VEGF inhibitors remain active after progression on first-line VEGF therapy in many patients."},{label:"Duration",detail:"Treatment continues until progression or unacceptable toxicity."}],regimens:[{id:"sub-nv-nivo",name:"Nivolumab (monotherapy)",category:"NCCN Category 1",description:"PD-1 immunotherapy. 240mg IV Q2W or 480mg Q4W. Preferred if no prior IO."},{id:"sub-nv-cabo",name:"Cabozantinib",category:"NCCN Category 1",description:"Oral targeted therapy. 60mg daily."},{id:"sub-nv-lenvat-ever",name:"Lenvatinib + Everolimus",category:"NCCN Category 1",description:"Oral combination targeted therapy."},{id:"sub-nv-axitinib",name:"Axitinib",category:"NCCN Category 2A",description:"Oral VEGF inhibitor. 5mg twice daily."},{id:"sub-nv-ever",name:"Everolimus",category:"NCCN Category 2A",description:"Oral mTOR inhibitor. 10mg daily."},{id:"sub-nv-suni",name:"Sunitinib",category:"NCCN Category 2A",description:"If not used first-line."}],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024."}};var bu={"pembro-adjuv":{name:"Pembrolizumab 400mg Q6W",category:"Adjuvant immunotherapy \xB7 NCCN Category 1",type:"medication",overview:"An immunotherapy drug given by IV infusion every 6 weeks for approximately 12 months after surgery. Based on results from the KEYNOTE-564 trial.",whatItInvolves:["You visit an infusion centre every 6 weeks for an IV infusion.","Each infusion takes about 30 minutes once the IV is set up.","No port is required \u2014 a standard IV line is used.","Treatment continues for 17 cycles, approximately 12 months in total."],administration:"Outpatient infusion centre. IV infusion over 30 minutes every 6 weeks. No port or PICC required.",whatToExpect:["Most infusions are well tolerated. Many people work and carry on normal activities throughout treatment.","Fatigue is the most commonly reported side effect. Peaks in the first few cycles for many people.","You will have blood tests before each cycle to check for immune-related changes.","Immune-related side effects can develop at any time \u2014 report any new symptoms promptly."],schedule:"400mg IV every 6 weeks \xD7 17 cycles (approximately 12 months).",components:[{name:"Pembrolizumab (Keytruda)",dose:"400mg",schedule:"IV infusion every 6 weeks",role:'A PD-1 inhibitor that removes a "brake" on the immune system, helping it recognise and attack cancer cells.'}],sideEffects:[{name:"Fatigue",severity:"Common",detail:"Most people notice some fatigue, particularly in the first few cycles. Usually manageable."},{name:"Skin rash or itching",severity:"Common",detail:"Often mild. Topical treatments usually help. Tell your team if it spreads or becomes severe."},{name:"Immune-related side effects",severity:"Monitor",detail:"The immune system can affect any organ. Thyroid, liver, lung, and bowel are most common. Prompt reporting of new symptoms is important."},{name:"Joint pain",severity:"Less common",detail:"Immune-related joint inflammation. Usually responds to treatment if caught early."}],monitoring:["Blood count and metabolic panel before each cycle","Thyroid function every 2\u20133 cycles","Imaging scans per surveillance schedule"],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024. KEYNOTE-564."},"fl-nivo-cabo":{name:"Nivolumab + Cabozantinib",category:"First-line systemic therapy \xB7 NCCN Category 1",type:"medication",overview:"A combination of an immunotherapy (nivolumab) and an oral targeted therapy (cabozantinib). One of the most commonly recommended first-line options for metastatic clear cell RCC.",whatItInvolves:["Nivolumab is given as an IV infusion every 2 or 4 weeks at an infusion centre.","Cabozantinib is taken as a daily oral tablet at home.","No port is required \u2014 standard IV access for infusions.","Treatment continues until the cancer progresses or side effects become unmanageable."],administration:"Nivolumab: outpatient infusion centre. Cabozantinib: oral tablet at home daily.",whatToExpect:["Infusion days are typically 2\u20133 hour visits including prep and monitoring time.","Cabozantinib tablets are taken every day, with or without food.","Fatigue and hand-foot syndrome are common in the first weeks of cabozantinib.","Nivolumab infusions are generally well tolerated but can cause immune-related side effects."],schedule:"Nivolumab 240mg Q2W or 480mg Q4W. Cabozantinib 40mg oral daily. Continuous until progression.",components:[{name:"Nivolumab (Opdivo)",dose:"240mg Q2W or 480mg Q4W",schedule:"IV infusion every 2 or 4 weeks",role:"PD-1 immunotherapy that helps the immune system attack cancer cells."},{name:"Cabozantinib (Cabometyx)",dose:"40mg daily",schedule:"Oral tablet, taken daily",role:"Targets blood vessel growth (VEGF) and other pathways that cancer uses to grow and spread."}],sideEffects:[{name:"Fatigue",severity:"Common",detail:"From both agents. Usually most prominent in the first month."},{name:"Hand-foot syndrome",severity:"Common",detail:"Redness, tenderness on palms and soles from cabozantinib. Moisturise daily."},{name:"Hypertension",severity:"Monitor",detail:"Cabozantinib can raise blood pressure. Monitored at each visit."},{name:"Immune-related side effects",severity:"Monitor",detail:"Nivolumab can cause immune inflammation in any organ. Report new symptoms promptly."},{name:"Diarrhoea",severity:"Common",detail:"Can occur from either agent. Usually manageable with diet adjustments and medication."}],monitoring:["Blood pressure check at each visit","Blood count and metabolic panel before each infusion","Thyroid function every 2\u20133 cycles","Imaging every 8\u201312 weeks"],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024. CheckMate 9ER."},"fl-pembro-axitinib":{name:"Pembrolizumab + Axitinib",category:"First-line systemic therapy \xB7 NCCN Category 1",type:"medication",overview:"A combination of immunotherapy (pembrolizumab) and oral targeted therapy (axitinib). Demonstrated improved survival in the KEYNOTE-426 trial.",whatItInvolves:["Pembrolizumab is given as an IV infusion every 3 weeks at an infusion centre.","Axitinib is taken as an oral tablet twice daily at home.","No port required. Each infusion visit is approximately 1\u20132 hours."],administration:"Pembrolizumab: outpatient infusion. Axitinib: oral tablet twice daily at home.",whatToExpect:["Twice-daily axitinib dosing requires a consistent routine \u2014 take with or without food at the same times each day.","Fatigue and hypertension are the most common early side effects from axitinib.","Infusion days with pembrolizumab are typically well tolerated."],schedule:"Pembrolizumab 200mg Q3W. Axitinib 5mg oral twice daily. Continuous until progression.",components:[{name:"Pembrolizumab (Keytruda)",dose:"200mg",schedule:"IV every 3 weeks",role:"PD-1 immunotherapy to help the immune system target cancer."},{name:"Axitinib (Inlyta)",dose:"5mg twice daily",schedule:"Oral tablet, twice daily",role:"VEGF inhibitor that blocks blood supply to tumors."}],sideEffects:[{name:"Hypertension",severity:"Common",detail:"From axitinib. Monitored at each visit. Usually managed with medication."},{name:"Fatigue",severity:"Common",detail:"From both agents."},{name:"Diarrhoea",severity:"Common",detail:"Usually manageable."},{name:"Immune-related side effects",severity:"Monitor",detail:"From pembrolizumab. Can affect any organ."}],monitoring:["Blood pressure at each visit","Blood count and metabolic panel before each infusion","Thyroid function every few cycles","Imaging every 8\u201312 weeks"],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024. KEYNOTE-426."},"fl-nivo-ipi":{name:"Nivolumab + Ipilimumab",category:"First-line systemic therapy \xB7 NCCN Category 1 (intermediate/poor risk)",type:"medication",overview:"A dual immunotherapy combination. Ipilimumab is given for 4 doses alongside nivolumab, then nivolumab continues alone as maintenance. Based on CheckMate 214.",whatItInvolves:["Both drugs are given as IV infusions every 3 weeks for the first 4 cycles (approximately 12 weeks).","After 4 doses, ipilimumab stops and nivolumab continues alone every 2 or 4 weeks.","No port is typically required. Each visit is 2\u20134 hours.","The combination phase has higher rates of immune-related side effects than either drug alone."],administration:"Outpatient infusion centre. Induction: Q3W \xD7 4 cycles. Maintenance: nivolumab Q2W or Q4W.",whatToExpect:["The first 4 cycles (combination phase) carry the highest risk of immune side effects.","After ipilimumab stops, most people tolerate nivolumab maintenance well.","Fatigue, skin changes, and diarrhoea are most common in the induction phase.","Immune-related toxicity requires prompt attention \u2014 contact your team for any new symptoms."],schedule:"Induction: nivolumab 3mg/kg + ipilimumab 1mg/kg Q3W \xD7 4 cycles. Maintenance: nivolumab 240mg Q2W or 480mg Q4W.",components:[{name:"Nivolumab (Opdivo)",dose:"3mg/kg (induction), then 240mg or 480mg",schedule:"Q3W induction, then Q2W or Q4W maintenance",role:"PD-1 inhibitor immunotherapy."},{name:"Ipilimumab (Yervoy)",dose:"1mg/kg",schedule:"Q3W \xD7 4 doses only",role:"CTLA-4 inhibitor. Works with nivolumab to activate the immune system more broadly."}],sideEffects:[{name:"Immune-related side effects",severity:"Monitor",detail:"Higher risk with dual immunotherapy than single agent. Can affect skin, gut, liver, lungs, endocrine glands. Prompt reporting essential."},{name:"Diarrhoea / colitis",severity:"Monitor",detail:"More common with ipilimumab. Report more than 4 loose stools per day."},{name:"Fatigue",severity:"Common",detail:"Can be significant during induction phase."},{name:"Skin rash",severity:"Common",detail:"Often mild. Topical treatment usually helps."}],monitoring:["Blood count and metabolic panel before every cycle","Liver function tests before every cycle","Thyroid and other endocrine labs regularly","Imaging every 8\u201312 weeks"],source:"NCCN Clinical Practice Guidelines in Oncology: Kidney Cancer, Version 2.2024. CheckMate 214."},"sub-io-cabo":{name:"Cabozantinib",category:"Subsequent systemic therapy \xB7 NCCN Category 1",type:"medication",overview:"An oral targeted therapy taken daily at home. One of the preferred options after prior immunotherapy-based treatment.",whatItInvolves:["A single daily oral tablet taken at home, with or without food.","No infusion visits required \u2014 clinic visits are for monitoring only.","Blood pressure monitoring at home may be recommended."],administration:"Oral tablet taken daily at home. Clinic visits for monitoring every 4\u20138 weeks.",whatToExpect:["Hand-foot syndrome (redness, tenderness on palms and soles) often develops in the first few weeks \u2014 moisturise daily.","Fatigue and appetite changes are common early on.","Blood pressure often rises on cabo
